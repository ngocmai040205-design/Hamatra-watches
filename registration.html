<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamatra | Đăng ký</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/hamatra.css">
</head>
<body>
  <main class="section">
    <div class="auth-card">
      <p class="eyebrow">Tạo tài khoản</p>
      <h1 style="font-size:3rem;">Đăng ký thành viên Hamatra</h1>
      <form class="form-grid">
        <div><label>Họ tên</label><input type="text" placeholder="Nhập họ tên"></div>
        <div><label>Email</label><input type="email" placeholder="ten@email.com"></div>
        <div><label>Số điện thoại</label><input type="text" placeholder="0909 xxx xxx"></div>
        <div><label>Mật khẩu</label><input type="password" placeholder="Tạo mật khẩu"></div>
        <a class="button" href="./accountManagement.html">Tạo tài khoản</a>
      </form>
    </div>
  </main>
</body>
</html>
