<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamatra | Liên hệ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/hamatra.css">
</head>
<body>
  <main class="section">
    <div class="container contact-grid">
      <section class="contact-card">
        <p class="eyebrow">Liên hệ showroom</p>
        <h1 style="font-size:3.2rem;">Hamatra sẵn sàng tư vấn mẫu đồng hồ phù hợp cho bạn.</h1>
        <ul class="contact-list">
          <li>Showroom: 88 Nguyễn Huệ, Quận 1, TP. HCM</li>
          <li>Hotline: 0909 000 888</li>
          <li>Email: hello@hamatra.vn</li>
        </ul>
      </section>
      <section class="contact-card">
        <form class="form-grid">
          <div><label>Họ và tên</label><input type="text" placeholder="Nhập tên của bạn"></div>
          <div><label>Số điện thoại</label><input type="text" placeholder="Nhập số điện thoại"></div>
          <div><label>Nhu cầu</label><textarea placeholder="Bạn cần tư vấn đồng hồ nam, nữ, quà tặng hay đồng hồ đeo đi làm?"></textarea></div>
          <button class="button" type="button">Gửi thông tin</button>
        </form>
      </section>
    </div>
  </main>
</body>
</html>
